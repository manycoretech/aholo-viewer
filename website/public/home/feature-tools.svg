<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-label="Aholo Viewer toolchain pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101b"/>
      <stop offset=".58" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111c2e"/>
      <stop offset="1" stop-color="#08111f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#263246" stroke-width="1" opacity=".45"/>
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.19 0 0 0 0 0.83 0 0 0 0 0.75 0 0 0 .55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes dash {
        to {
          stroke-dashoffset: -42;
        }
      }

      @keyframes scan {
        0% {
          transform: translateY(-88px);
          opacity: 0;
        }

        18%, 76% {
          opacity: .72;
        }

        100% {
          transform: translateY(250px);
          opacity: 0;
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: .56;
          transform: scale(.96);
        }

        50% {
          opacity: 1;
          transform: scale(1.04);
        }
      }

      .section {
        fill: #8bb5c7;
        font: 700 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .label {
        fill: #d9f8ff;
        font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .small {
        fill: #9fb4c7;
        font: 520 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .mono {
        fill: #c7f9ee;
        font: 600 13px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .muted-mono {
        fill: #83a6b6;
        font: 520 11px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .panel {
        fill: url(#panel);
        stroke: #31445d;
        stroke-width: 1.4;
      }

      .card {
        fill: #0b1424;
        stroke: #31445d;
        stroke-width: 1.2;
      }

      .flow {
        fill: none;
        stroke: #2dd4bf;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-dasharray: 12 9;
        animation: dash 2.8s linear infinite;
      }

      .flow-blue {
        stroke: #38bdf8;
      }

      .flow-violet {
        stroke: #a78bfa;
      }

      .scan {
        transform-origin: center;
        animation: scan 4.2s ease-in-out infinite;
      }

      .pulse {
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 2.6s ease-in-out infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        .flow,
        .scan,
        .pulse {
          animation: none;
        }
      }
    </style>
  </defs>

  <rect width="960" height="640" fill="url(#bg)"/>
  <rect width="960" height="640" fill="url(#grid)" opacity=".52"/>
  <path d="M90 550C184 440 246 505 328 406C416 300 508 360 594 237C676 121 772 98 870 150" fill="none" stroke="#2dd4bf" stroke-width="84" stroke-linecap="round" opacity=".05"/>

  <g>
    <text class="section" x="82" y="137">Input assets</text>
    <g>
      <rect class="card" x="72" y="156" width="172" height="52" rx="10"/>
      <path d="M96 166h22l11 11v20H96z" fill="#0f2435" stroke="#38bdf8"/>
      <path d="M118 166v11h11" fill="none" stroke="#38bdf8"/>
      <text class="label" x="146" y="187">PLY</text>
    </g>
    <g>
      <rect class="card" x="72" y="222" width="172" height="52" rx="10"/>
      <path d="M96 232h22l11 11v20H96z" fill="#10281f" stroke="#2dd4bf"/>
      <path d="M118 232v11h11" fill="none" stroke="#2dd4bf"/>
      <text class="label" x="146" y="253">SPZ</text>
    </g>
    <g>
      <rect class="card" x="72" y="288" width="172" height="52" rx="10"/>
      <path d="M96 298h22l11 11v20H96z" fill="#251d36" stroke="#a78bfa"/>
      <path d="M118 298v11h11" fill="none" stroke="#a78bfa"/>
      <text class="label" x="146" y="319">SOG</text>
    </g>
    <g>
      <rect class="card" x="72" y="354" width="172" height="52" rx="10"/>
      <path d="M96 364h22l11 11v20H96z" fill="#2b2111" stroke="#f59e0b"/>
      <path d="M118 364v11h11" fill="none" stroke="#f59e0b"/>
      <text class="label" x="146" y="385">LCC</text>
    </g>
    <g>
      <rect class="card" x="72" y="420" width="172" height="52" rx="10"/>
      <path d="M96 430h22l11 11v20H96z" fill="#351b26" stroke="#fb7185"/>
      <path d="M118 430v11h11" fill="none" stroke="#fb7185"/>
      <text class="label" x="146" y="451">SPLAT</text>
    </g>
  </g>

  <path class="flow flow-blue" d="M246 182C280 182 288 214 322 214"/>
  <path class="flow" d="M246 248C282 248 288 250 322 250"/>
  <path class="flow flow-violet" d="M246 314C282 314 288 286 322 286"/>
  <path class="flow" d="M246 380C280 380 288 324 322 324"/>
  <path class="flow flow-violet" d="M246 446C282 446 288 356 322 356"/>

  <g filter="url(#softGlow)">
    <rect class="panel" x="322" y="142" width="322" height="250" rx="16"/>
    <rect x="322" y="142" width="322" height="42" rx="16" fill="#101b2d"/>
    <path d="M322 184H644" stroke="#31445d"/>
    <circle cx="348" cy="163" r="5" fill="#f87171"/>
    <circle cx="366" cy="163" r="5" fill="#fbbf24"/>
    <circle cx="384" cy="163" r="5" fill="#34d399"/>
    <text class="mono" x="410" y="168">splat-transform pipeline.json</text>
    <rect class="scan" x="336" y="198" width="294" height="44" rx="12" fill="url(#teal)" opacity=".13"/>
    <text class="muted-mono" x="348" y="216">{</text>
    <text class="mono" x="372" y="238">"create"</text>
    <text class="muted-mono" x="462" y="238">: "normalize formats",</text>
    <text class="mono" x="372" y="268">"lod:auto-chunk"</text>
    <text class="muted-mono" x="522" y="268">: "streaming",</text>
    <text class="mono" x="372" y="298">"voxel"</text>
    <text class="muted-mono" x="446" y="298">: "collision SVO",</text>
    <text class="mono" x="372" y="328">"output"</text>
    <text class="muted-mono" x="432" y="328">: "viewer-ready output"</text>
    <text class="muted-mono" x="348" y="358">}</text>
    <rect x="360" y="407" width="246" height="38" rx="10" fill="#08111f" stroke="#2dd4bf" stroke-opacity=".6"/>
    <text class="mono" x="384" y="431">pnpm splat-transform</text>
  </g>

  <path class="flow" d="M644 214C672 214 674 163 704 163"/>
  <path class="flow flow-blue" d="M644 265C674 265 674 274 704 274"/>
  <path class="flow flow-violet" d="M644 326C674 326 674 385 704 385"/>

  <g>
    <text class="section" x="704" y="137">Generated outputs</text>
    <g>
      <rect class="card" x="704" y="154" width="184" height="84" rx="12"/>
      <text class="label" x="724" y="182">LOD chunks</text>
      <text class="small" x="724" y="202">budgeted streaming</text>
      <g class="pulse">
        <rect x="731" y="214" width="94" height="10" rx="5" fill="url(#blue)"/>
        <rect x="748" y="198" width="94" height="10" rx="5" fill="#38bdf8" opacity=".62"/>
        <rect x="765" y="182" width="94" height="10" rx="5" fill="#93c5fd" opacity=".46"/>
      </g>
    </g>
    <g>
      <rect class="card" x="704" y="266" width="184" height="84" rx="12"/>
      <text class="label" x="724" y="294">Voxel SVO</text>
      <text class="small" x="724" y="314">ray and capsule tests</text>
      <g transform="translate(735 322)">
        <rect width="16" height="16" fill="#2dd4bf" opacity=".86"/>
        <rect x="20" width="16" height="16" fill="#2dd4bf" opacity=".48"/>
        <rect x="40" width="16" height="16" fill="#2dd4bf" opacity=".72"/>
        <rect y="20" width="16" height="16" fill="#2dd4bf" opacity=".42"/>
        <rect x="20" y="20" width="16" height="16" fill="#2dd4bf" opacity=".84"/>
        <rect x="60" y="20" width="16" height="16" fill="#2dd4bf" opacity=".54"/>
        <path d="M90 8h38M90 28h52" stroke="#c7f9ee" stroke-width="4" stroke-linecap="round" opacity=".72"/>
      </g>
    </g>
    <g>
      <rect class="card" x="704" y="378" width="184" height="84" rx="12"/>
      <text class="label" x="724" y="406">Edit + pick</text>
      <text class="small" x="724" y="426">runtime interaction</text>
      <path d="M735 445c24-25 51-21 72-3 14 12 25 13 40 2" fill="none" stroke="url(#violet)" stroke-width="5" stroke-linecap="round"/>
      <path d="M816 434l29 13-16 7-5 16z" fill="#e9d5ff" stroke="#a78bfa"/>
    </g>
  </g>

</svg>
